services:
    db:
        image: postgres:15
        container_name: simple-log-pipeline-db-compose
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: event_pipeline
        ports:
            - "5434:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    app:
        build: .
        container_name: simple-log-pipeline-app
        depends_on:
            - db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: event_pipeline
            POSTGRES_HOST: db
            POSTGRES_PORT: 5432
        volumes:
            - ./output:/app/output

volumes:
    postgres_data:
